<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d1519">
  <title>NexusEngine TreeFactory</title>
  <link rel="stylesheet" href="./styles.css">

  <script type="importmap">
    {
      "imports": {
        "nexusengine": "./src/vendor/nexusengine.js",
        "@luminarylabs/nexusengine-kits/seed-kit": "./src/vendor/nexus-kits.js",
        "@luminarylabs/nexusengine-kits/procedural-objects": "./src/vendor/nexus-kits.js",
        "@luminarylabs/nexusengine-protokits/procedural-tree-kits": "./src/vendor/nexus-kits.js",
        "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <strong>NexusEngine TreeFactory</strong>
        <span class="subtitle">Procedural tree laboratory</span>
      </div>
      <div class="top-actions">
        <label class="compact-toggle">
          <input id="auto-build" type="checkbox" checked>
          Live rebuild
        </label>
        <button id="randomize-seed">Randomize</button>
        <button id="generate-tree" class="primary">Generate</button>
      </div>
    </header>

    <aside class="left-panel panel">
      <section>
        <div class="section-heading">
          <h2>Species</h2>
          <span id="species-count"></span>
        </div>
        <div id="species-grid" class="species-grid"></div>
      </section>

      <section>
        <div class="section-heading">
          <h2>Tree controls</h2>
          <button id="reset-species" class="small">Reset</button>
        </div>
        <div id="control-groups"></div>
      </section>
    </aside>

    <main class="viewport-shell">
      <canvas id="viewport"></canvas>

      <div class="viewport-toolbar">
        <label>
          LOD
          <select id="lod-mode">
            <option value="0" selected>LOD0</option>
            <option value="1">LOD1</option>
            <option value="2">LOD2</option>
            <option value="3">Impostor</option>
            <option value="auto">Automatic</option>
          </select>
        </label>
        <label class="compact-toggle">
          <input id="show-bounds" type="checkbox">
          Bounds
        </label>
        <label class="compact-toggle">
          <input id="rotate-tree" type="checkbox">
          Turntable
        </label>
      </div>

      <div id="viewport-status" class="viewport-status">Starting…</div>
    </main>

    <aside class="right-panel panel">
      <section>
        <h2>Build</h2>
        <dl id="build-stats" class="stats-grid"></dl>
      </section>

      <section>
        <div class="section-heading">
          <h2>Capture atlas</h2>
          <span id="capture-status"></span>
        </div>
        <canvas id="atlas-preview" width="512" height="512"></canvas>
        <div id="capture-grid" class="capture-grid"></div>
      </section>

      <section>
        <h2>Object contract</h2>
        <pre id="object-preview"></pre>
      </section>

      <section>
        <h2>Exports</h2>
        <div class="export-grid">
          <button id="export-object">Object JSON</button>
          <button id="export-preset">Preset JSON</button>
          <button id="export-glb">LOD0 GLB</button>
          <button id="export-atlas">Atlas PNG</button>
        </div>
        <label class="file-button">
          Import preset
          <input id="import-preset" type="file" accept="application/json,.json">
        </label>
      </section>
    </aside>
  </div>

  <div id="fatal" hidden>
    <div>
      <strong>TreeFactory could not start.</strong>
      <p id="fatal-message"></p>
    </div>
  </div>

  <script>
    window.addEventListener("error", (event) => {
      const targetUrl = event.target?.src || event.target?.href;
      if (!targetUrl && event.error) return;
      const fatal = document.querySelector("#fatal");
      const message = document.querySelector("#fatal-message");
      if (fatal && message) {
        message.textContent = targetUrl
          ? `A required module failed to load: ${targetUrl}`
          : String(event.message || "A required module failed to load.");
        fatal.hidden = false;
      }
    }, true);
  </script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
